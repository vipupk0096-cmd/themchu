<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINH WATERMARK PRO 2026</title>

<style>
:root { --primary:#007bff; --success:#28a745; --dark:#2d3436; }

body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f4f7f6;
    margin:0;
    padding:10px;
    color:var(--dark);
}

.container { max-width:100%; margin:auto; padding-bottom:100px; }

.controls {
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.grid-settings { display:grid; grid-template-columns:1fr; gap:12px; }
@media (min-width:600px){
    .grid-settings{ grid-template-columns:1fr 1fr; }
}

.preview-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:20px;
}

.preview-item {
    background:white;
    padding:5px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

canvas { width:100%; border-radius:6px; }

label {
    font-weight:700;
    font-size:0.75rem;
    display:block;
    margin-bottom:5px;
    text-transform:uppercase;
}

input,select {
    width:100%;
    padding:10px;
    border:1px solid #dfe6e9;
    border-radius:8px;
}

#downloadBtn{
    background:var(--success);
    color:white;
    font-weight:bold;
    border:none;
    width:calc(100% - 20px);
    padding:18px;
    border-radius:15px;
    font-size:1.1rem;
    position:fixed;
    bottom:15px;
    left:10px;
    z-index:1000;
}

.status{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    color:var(--primary);
}
</style>
</head>

<body>

<div class="container">
<div class="controls">
<div class="grid-settings">

<div>
<label>Tải ảnh</label>
<input type="file" id="upload" accept="image/*" multiple>
</div>

<div>
<label>Nhà cung cấp</label>
<select id="supplier">
 <option value="1A801">lan tùng (1A801)</option>
                    <option value="1A802">khải kiệt (1A802)</option>
                    <option value="1A803">alan (1A803)</option>
                    <option value="1A804">a chu (1A804)</option>
                    <option value="1A805">a sần (1A805)</option>
                    <option value="1A806">a minh (1A806)</option>
                    <option value="1A807">a tang (1A807)</option>
                    <option value="1A808">a tâu (1A808)</option>
                    <option value="1A809">a lý (1A809)</option>
                    <option value="1A810">a hồng (1A810)</option>
                    <option value="1A811">a sinh (1A811)</option>
                    <option value="1A812">a long (1A812)</option>
                    <option value="1A813">sanly (1A813)</option>
                    <option value="1A814">sinh ủng (1A814)</option>
                    <option value="1A815">mây già (1A815)</option>
                    <option value="1A816">a ly (1A816)</option>
                    <option value="1A817">a chung (1A817)</option>
                    <option value="1A818">a bình (1A818)</option>
                    <option value="1A819">seo hoàng (1A819)</option>
                    <option value="1A820">a linh (1A820)</option>
                    <option value="1A821">mongmanh (1A821)</option>
                    <option value="1A822">a chân (1A822)</option>
                    <option value="1A823">seo hoàng già (1A823)</option>
                    <option value="1A824">a hỷ (1A824)</option>
                    <option value="1A825">a vũ (1A825)</option>
                    <option value="1A826">hoa túi (1A826)</option>
                    <option value="1A827">a văn - a hoa (1A827)</option>
                    <option value="1A828">mây trẻ (1A828)</option>
                    <option value="1A829">khải béo (1A829)</option>
                    <option value="1A830">a sinh nam (1A830)</option>
</select>
</div>

<div>
<label>Màu & vị trí</label>
<div style="display:flex;gap:8px;">
<input type="color" id="textColor" value="#ffffff" style="width:60px;">
<select id="textPos">
<option value="bottom-right">Phải - Dưới</option>
<option value="bottom-left">Trái - Dưới</option>
<option value="top-right">Phải - Trên</option>
<option value="top-left">Trái - Trên</option>
</select>
</div>
</div>

<div>
<label>Cỡ chữ & mờ</label>
<div style="display:flex;gap:10px;">
<input type="range" id="textSize" min="1" max="25" value="8">
<input type="range" id="textOpacity" min="1" max="10" value="10">
</div>
</div>

<div>
<label>Mã ghi đè</label>
<input type="text" id="overrideName">
</div>

</div>

<div id="status" class="status">Sẵn sàng</div>
</div>

<div id="previewGrid" class="preview-grid"></div>
</div>

<button id="downloadBtn">XUẤT & CHIA SẺ</button>

<script>
const $ = id => document.getElementById(id);
const upload = $('upload');
const previewGrid = $('previewGrid');
const status = $('status');
const downloadBtn = $('downloadBtn');

const MAX_WIDTH = 1500;
const JPEG_QUALITY = 0.75;
const BATCH_SIZE = 4;

let fileData = [];

/* =========================
   UTIL
========================= */

function debounce(fn,delay=200){
    let t;
    return (...a)=>{
        clearTimeout(t);
        t=setTimeout(()=>fn(...a),delay);
    };
}

function loadImage(file){
    return new Promise(res=>{
        const img=new Image();
        img.onload=()=>{
            URL.revokeObjectURL(img.src);
            res(img);
        };
        img.src=URL.createObjectURL(file);
    });
}

function getConfig(){
    return {
        supplier:$('supplier').value,
        color:$('textColor').value,
        sizeRatio:$('textSize').value/100,
        pos:$('textPos').value,
        opacity:$('textOpacity').value/10,
        overrideName:$('overrideName').value.trim()
    };
}

function calculatePriceString(name){
    const regex=/(\d+(?:\.\d+)?)\s*([bl])/gi;
    const matches=[...name.matchAll(regex)];
    if(!matches.length) return "";
    return "ht"+matches.map(m=>Math.round(m[1]*3.9)).join("/");
}

/* =========================
   RENDER
========================= */

async function renderCanvas(file,canvas){
    const img=await loadImage(file);
    const ctx=canvas.getContext("2d");
    const config=getConfig();

    let width=img.width;
    let height=img.height;

    if(width>MAX_WIDTH){
        const scale=MAX_WIDTH/width;
        width=MAX_WIDTH;
        height=height*scale;
    }

    canvas.width=width;
    canvas.height=height;

    ctx.drawImage(img,0,0,width,height);

    const price=calculatePriceString(file.name);
    const text=config.supplier+price;

    const fontSize=Math.floor(width*config.sizeRatio);
    ctx.font=`bold ${fontSize}px sans-serif`;
    ctx.fillStyle=config.color;
    ctx.globalAlpha=config.opacity;

    ctx.shadowColor="rgba(0,0,0,0.8)";
    ctx.shadowBlur=fontSize/4;
    ctx.shadowOffsetX=2;
    ctx.shadowOffsetY=2;

    const margin=fontSize*0.7;
    ctx.textAlign=config.pos.includes("right")?"right":"left";
    ctx.textBaseline=config.pos.includes("bottom")?"bottom":"top";

    const x=config.pos.includes("right")?width-margin:margin;
    const y=config.pos.includes("bottom")?height-margin:margin;

    ctx.fillText(text,x,y);

    return text;
}

/* =========================
   PREVIEW
========================= */

const updatePreview=debounce(()=>{
    if(!fileData.length) return;
    fileData.slice(0,2).forEach((f,i)=>{
        const canvas=$(`canvas_${i}`);
        if(canvas) renderCanvas(f,canvas);
    });
},200);

upload.onchange=e=>{
    fileData=[...e.target.files];
    previewGrid.innerHTML="";
    fileData.slice(0,2).forEach((f,i)=>{
        const div=document.createElement("div");
        div.className="preview-item";
        div.innerHTML=`<canvas id="canvas_${i}"></canvas>`;
        previewGrid.appendChild(div);
        renderCanvas(f,$(`canvas_${i}`));
    });
    status.innerText=`Đã chọn ${fileData.length} ảnh`;
};

/* =========================
   SHARE STABLE
========================= */

downloadBtn.onclick=async()=>{
    if(!fileData.length) return alert("Chưa có ảnh");

    downloadBtn.disabled=true;
    status.innerText="⏳ Đang xử lý...";

    try{
        const files=[];

        for(let i=0;i<fileData.length;i++){
            const tempCanvas=document.createElement("canvas");
            await renderCanvas(fileData[i],tempCanvas);

            const blob=await new Promise(r=>tempCanvas.toBlob(r,"image/jpeg",JPEG_QUALITY));
            if(!blob) continue;

            files.push(new File([blob],`minh_${i+1}.jpg`,{type:"image/jpeg"}));

            tempCanvas.width=0;
            tempCanvas.height=0;
        }

        if(navigator.canShare){
            for(let i=0;i<files.length;i+=BATCH_SIZE){
                const batch=files.slice(i,i+BATCH_SIZE);
                if(navigator.canShare({files:batch})){
                    await navigator.share({files:batch});
                    await new Promise(r=>setTimeout(r,300));
                }
            }
            status.innerText="✅ Hoàn tất!";
        }else{
            status.innerText="⚠️ Không hỗ trợ Share API";
        }

    }catch(e){
        status.innerText="❌ Lỗi hoặc đã hủy";
    }

    downloadBtn.disabled=false;
};
</script>

</body>
</html>
