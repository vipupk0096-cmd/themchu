<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINH ĐẸP TRAI</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #2d3436; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; color: var(--dark); }
        .container { max-width: 100%; margin: auto; padding-bottom: 80px; }
        
        .controls { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .grid-settings { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 600px) { .grid-settings { grid-template-columns: 1fr 1fr; } }
        
        .formula-group { background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px dashed #ced4da; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .preview-item { background: white; padding: 5px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; }
        
        canvas { max-width: 100%; height: auto; border-radius: 4px; }
        label { font-weight: 600; font-size: 0.8rem; color: #636e72; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 1rem; box-sizing: border-box; background: #fff;}
        
        #downloadBtn { 
            background: var(--success); color: white; font-weight: bold; border: none; 
            width: calc(100% - 20px); padding: 15px; border-radius: 12px;
            font-size: 1.1rem; position: fixed; bottom: 10px; left: 10px; z-index: 1000;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        }
        #downloadBtn:disabled { background: #6c757d; box-shadow: none; }
        .status { text-align: center; margin-top: 10px; font-weight: bold; color: var(--primary); font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <div class="grid-settings">
            <div>
                <label>1. Tải ảnh lên</label>
                <input type="file" id="upload" accept="image/*" multiple>
            </div>
            <div>
                <label>2. Nhà cung cấp</label>
                <select id="supplier">
                    <option value="1A801">lan tùng (1A801)</option>
                    <option value="1A802">khải kiệt (1A802)</option>
                    <option value="1A803">alan (1A803)</option>
                    <option value="1A804">a chu (1A804)</option>
                    <option value="1A805">a sần (1A805)</option>
                    <option value="1A806">a minh (1A806)</option>
                    <option value="1A807">a tang (1A807)</option>
                    <option value="1A808">a tâu (1A808)</option>
                    <option value="1A809">a lý (1A809)</option>
                    <option value="1A810">a hồng (1A810)</option>
                    <option value="1A811">a sinh (1A811)</option>
                    <option value="1A812">a long (1A812)</option>
                    <option value="1A813">sanly (1A813)</option>
                    <option value="1A814">sinh ủng (1A814)</option>
                    <option value="1A815">mây già (1A815)</option>
                    <option value="1A816">a ly (1A816)</option>
                    <option value="1A817">a chung (1A817)</option>
                    <option value="1A818">a bình (1A818)</option>
                    <option value="1A819">seo hoàng (1A819)</option>
                    <option value="1A820">a linh (1A820)</option>
                    <option value="1A821">mongmanh (1A821)</option>
                    <option value="1A822">a chân (1A822)</option>
                    <option value="1A823">seo hoàng già (1A823)</option>
                    <option value="1A824">a hỷ (1A824)</option>
                    <option value="1A825">a vũ (1A825)</option>
                    <option value="1A826">hoa túi (1A826)</option>
                    <option value="1A827">a văn - a hoa (1A827)</option>
                    <option value="1A828">mây trẻ (1A828)</option>
                    <option value="1A829">khải béo (1A829)</option>
                    <option value="1A830">a sinh nam (1A830)</option>
                </select>
            </div>
            <div>
                <label>3. Màu & Vị trí</label>
                <div style="display: flex; gap: 8px;">
                    <input type="color" id="textColor" value="#ffffff" style="width: 50px; padding: 2px; height: 45px;">
                    <select id="textPos">
                        <option value="top-left">Trái - Trên</option>
                        <option value="top-right">Phải - Trên</option>
                        <option value="bottom-left">Trái - Dưới</option>
                        <option value="bottom-right" selected>Phải - Dưới</option>
                    </select>
                </div>
            </div>
            <div>
                <label>4. Cỡ chữ & Mờ</label>
                <div style="display: flex; gap: 10px;">
                    <input type="range" id="textSize" min="1" max="20" value="7">
                    <input type="range" id="textOpacity" min="1" max="10" value="10">
                </div>
            </div>
            <div>
                <label>5. Mã ghi đè (Tùy chọn)</label>
                <input type="text" id="overrideName" placeholder="VD: 35l/37l">
            </div>

            <div class="formula-group">
                <div>
                    <label>Giá (NDT)</label>
                    <input type="number" id="giaTrung" value="3.9" step="0.1" style="color: var(--primary); font-weight: bold;">
                </div>
                <div>
                    <label>Lớn (L)</label>
                    <input type="number" id="giaNguoiLon" value="17" step="1" style="color: #d63031; font-weight: bold;">
                </div>
                <div>
                    <label>Trẻ (B)</label>
                    <input type="number" id="giaTreEm" value="15" step="1" style="color: #0984e3; font-weight: bold;">
                </div>
                <div>
                    <label>Phụ phí</label>
                    <input type="number" id="extraPrice" value="0" step="1" style="color: var(--success); font-weight: bold;">
                </div>
            </div>
        </div>
        <div id="status" class="status">Sẵn sàng</div>
    </div>

    <div id="previewGrid" class="preview-grid"></div>
</div>

<button id="downloadBtn">XUẤT & LƯU ẢNH (IPHONE)</button>

<script>
    const $ = id => document.getElementById(id);
    const upload = $('upload'), previewGrid = $('previewGrid'), status = $('status'), downloadBtn = $('downloadBtn');
    
    const inputsToSave = ['supplier', 'giaTrung', 'giaNguoiLon', 'giaTreEm', 'extraPrice', 'textPos', 'textColor'];
    inputsToSave.forEach(id => {
        const el = $(id);
        if (localStorage.getItem(id)) el.value = localStorage.getItem(id);
        el.addEventListener('change', () => localStorage.setItem(id, el.value));
    });

    const configIds = [...inputsToSave, 'textSize', 'textOpacity', 'overrideName'];
    let fileData = [];

    function calculateFinalPrice(filename, config) {
        const sourceName = config.overrideName ? config.overrideName : filename;
        const regex = /(\d+)\s*([blBL])/gi; 
        const matches = [...sourceName.matchAll(regex)];
        
        if (matches.length > 0) {
            const prices = matches.map(match => {
                const number = parseFloat(match[1]); 
                const type = match[2].toLowerCase(); 
                let finalPrice = 0;
                const baseCost = number * config.giaTrung; 
                
                if (type === 'l') finalPrice = baseCost + config.giaNguoiLon + config.extraPrice;
                else if (type === 'b') finalPrice = baseCost + config.giaTreEm + config.extraPrice;
                
                // Add "Ht" prefix instead of "k" suffix
                return "Ht" + Math.round(finalPrice);
            });
            // Return prices joined with "/" (e.g., Ht154/Ht161)
            return prices.join('/');
        }
        return sourceName.split(/[\s._-]/)[0]; 
    }

    upload.onchange = (e) => {
        fileData = Array.from(e.target.files);
        previewGrid.innerHTML = "";
        
        const demoFiles = fileData.slice(0, 2);
        demoFiles.forEach((file, i) => {
            const card = document.createElement('div');
            card.className = 'preview-item';
            card.innerHTML = `<canvas id="canvas_${i}"></canvas><div style="font-size:10px; margin-top:5px; white-space:nowrap; overflow:hidden;">${file.name}</div>`;
            previewGrid.appendChild(card);
            renderCanvas(file, $(`canvas_${i}`));
        });
        
        status.innerText = `Đã tải ${fileData.length} ảnh. Đang xem trước 2 ảnh.`;
    };

    configIds.forEach(id => {
        const element = $(id);
        if (element) {
            element.addEventListener('input', () => {
                if(fileData.length > 0) {
                    const demoFiles = fileData.slice(0, 2);
                    demoFiles.forEach((file, i) => renderCanvas(file, $(`canvas_${i}`)));
                }
            });
        }
    });

    async function renderCanvas(file, canvas) {
        const img = await loadImage(file);
        const config = {
            supplier: $('supplier').value, color: $('textColor').value,
            sizeRatio: $('textSize').value / 100, pos: $('textPos').value, opacity: $('textOpacity').value / 10,
            giaTrung: parseFloat($('giaTrung').value) || 0, giaNguoiLon: parseFloat($('giaNguoiLon').value) || 0,
            giaTreEm: parseFloat($('giaTreEm').value) || 0, extraPrice: parseFloat($('extraPrice').value) || 0,
            overrideName: $('overrideName').value.trim()
        };

        const calculatedPrice = calculateFinalPrice(file.name, config);
        
        // Construct the text line: Supplier Code + Price string
        // Assuming config.supplier is just the code like "1A801" now based on your select values
        const textLine = `${config.supplier} + ${calculatedPrice}`;

        canvas.width = img.width; canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        const fontSize = Math.floor(img.width * config.sizeRatio);
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.fillStyle = config.color;
        ctx.globalAlpha = config.opacity;
        ctx.shadowColor = "rgba(0,0,0,0.7)";
        ctx.shadowBlur = fontSize / 5; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;

        const margin = fontSize * 0.8;
        let x, y;

        if (config.pos === 'top-left') {
            ctx.textAlign = 'left'; ctx.textBaseline = 'top';
            x = margin; y = margin;
        } else if (config.pos === 'top-right') {
            ctx.textAlign = 'right'; ctx.textBaseline = 'top';
            x = img.width - margin; y = margin;
        } else if (config.pos === 'bottom-left') {
            ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
            x = margin; y = img.height - margin;
        } else {
            ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
            x = img.width - margin; y = img.height - margin;
        }

        ctx.fillText(textLine, x, y);
        
        // Return textLine for sharing purposes if needed
        return { canvas: canvas, price: textLine }; 
    }

    downloadBtn.onclick = async () => {
        if (!fileData.length) return;
        downloadBtn.disabled = true;
        
        const exportedFiles = [];
        const sharedPrices = new Set(); 

        try {
            for (let i = 0; i < fileData.length; i++) {
                status.innerText = `Đang xử lý: ${i + 1}/${fileData.length}...`;
                const tempCanvas = document.createElement('canvas');
                
                const result = await renderCanvas(fileData[i], tempCanvas);
                sharedPrices.add(result.price); 
                
                const blob = await new Promise(resolve => tempCanvas.toBlob(resolve, 'image/jpeg', 0.85));
                const file = new File([blob], `IMG_${Date.now()}_${i}.jpeg`, { type: 'image/jpeg' });
                exportedFiles.push(file);
                
                await new Promise(r => setTimeout(r, 100)); 
            }

            const dummyCanvas = document.createElement('canvas');
            dummyCanvas.width = 1; dummyCanvas.height = 1;
            const dummyBlob = await new Promise(resolve => dummyCanvas.toBlob(resolve, 'image/jpeg', 0.1));
            const dummyFile = new File([dummyBlob], `IMG_ZaloFix_${Date.now()}.jpeg`, { type: 'image/jpeg' });
            exportedFiles.push(dummyFile);

            if (navigator.canShare && navigator.canShare({ files: exportedFiles })) {
                // Modified share text format if desired, currently it just joins the lines
                const finalShareText = Array.from(sharedPrices).join('\n'); 
                
                status.innerText = "⏳ Đang mở bảng chia sẻ...";
                await navigator.share({
                    files: exportedFiles,
                    title: "Báo giá",
                    text: finalShareText
                });
                status.innerText = "✅ Hoàn tất!";
            } else {
                status.innerText = "Đang tải...";
                exportedFiles.forEach(file => {
                    const url = URL.createObjectURL(file);
                    const a = document.createElement('a');
                    a.href = url; a.download = file.name; a.click();
                    URL.revokeObjectURL(url);
                });
                status.innerText = "✅ Đã tải xong!";
            }
            
            $('overrideName').value = '';
            
        } catch (error) {
            console.error("Lỗi:", error);
            status.innerText = "❌ Hủy lưu hoặc có lỗi xảy ra.";
        }
        
        downloadBtn.disabled = false;
        downloadBtn.innerText = "XUẤT & LƯU ẢNH (IPHONE)";
    };

    function loadImage(file) {
        return new Promise(res => {
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => { URL.revokeObjectURL(url); res(img); };
            img.src = url;
        });
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
